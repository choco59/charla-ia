<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Votación en vivo · De cero a decisión</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #f9f9f8;
    --card: #ffffff;
    --border: rgba(0,0,0,0.08);
    --text: #1a1a1a;
    --muted: #666;
    --accent: #1a1a1a;
    --success: #16a34a;
    --info: #2563eb;
    --warn: #d97706;
    --danger: #dc2626;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111;
      --card: #1c1c1e;
      --border: rgba(255,255,255,0.1);
      --text: #f5f5f5;
      --muted: #999;
      --accent: #f5f5f5;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
  header { padding: 20px 20px 12px; border-bottom: 1px solid var(--border); }
  .logo { font-size: 13px; color: var(--muted); margin-bottom: 4px; }
  .title { font-size: 18px; font-weight: 600; color: var(--text); }
  .live-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; color: var(--success); margin-top: 6px; }
  .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); animation: pulse 1.4s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  main { flex: 1; padding: 20px; max-width: 480px; margin: 0 auto; width: 100%; }

  .poll-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 16px; display: none; }
  .poll-card.active { display: block; animation: pop .3s ease; }
  @keyframes pop { from{opacity:0;transform:scale(.97)} to{opacity:1;transform:scale(1)} }
  .poll-num { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
  .poll-q { font-size: 17px; font-weight: 600; color: var(--text); line-height: 1.35; margin-bottom: 18px; }

  .opt-btn { width: 100%; background: var(--bg); border: 1.5px solid var(--border); border-radius: 12px; padding: 14px 16px; font-size: 15px; color: var(--text); font-family: inherit; text-align: left; cursor: pointer; margin-bottom: 10px; transition: all .18s; display: flex; align-items: center; justify-content: space-between; }
  .opt-btn:hover:not(:disabled) { border-color: var(--accent); background: var(--card); }
  .opt-btn.selected { border-color: var(--info); background: rgba(37,99,235,.06); color: var(--info); font-weight: 600; }
  .opt-btn:disabled { cursor: not-allowed; opacity: .7; }
  .opt-icon { font-size: 18px; }

  .bar-wrap { margin-top: 14px; display: none; }
  .bar-wrap.show { display: block; }
  .bar-item { margin-bottom: 10px; }
  .bar-header { display: flex; justify-content: space-between; font-size: 13px; color: var(--muted); margin-bottom: 4px; }
  .bar-track { background: var(--border); border-radius: 6px; height: 8px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 6px; background: var(--muted); transition: width .5s ease; }
  .bar-fill.winner { background: var(--info); }
  .total-badge { font-size: 12px; color: var(--muted); text-align: center; margin-top: 10px; }
  .thanks-msg { font-size: 14px; color: var(--success); font-weight: 500; margin-top: 12px; padding: 10px 14px; background: rgba(22,163,74,.07); border-radius: 10px; }

  .waiting { text-align: center; padding: 60px 20px; color: var(--muted); }
  .waiting-icon { font-size: 48px; margin-bottom: 16px; }
  .waiting h2 { font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
  .waiting p { font-size: 14px; line-height: 1.6; }

  .closed { text-align: center; padding: 40px 20px; }
  .closed-icon { font-size: 40px; margin-bottom: 12px; }
  .closed h3 { font-size: 16px; font-weight: 600; color: var(--text); }

  footer { padding: 16px 20px; text-align: center; font-size: 12px; color: var(--muted); border-top: 1px solid var(--border); }
</style>
</head>
<body>
<header>
  <div class="logo">UNIVALLE · Ing. Ciencia de Datos e Inteligencia de Negocios</div>
  <div class="title">De cero a decisión</div>
  <div class="live-badge"><span class="live-dot"></span>Votación en vivo</div>
</header>

<main id="main">
  <div class="waiting" id="waiting-state">
    <div class="waiting-icon">⏳</div>
    <h2>Esperando votación...</h2>
    <p>El panelista activará la pregunta en un momento. Esta pantalla se actualiza automáticamente.</p>
  </div>
</main>

<footer>Charla académica · 2025 · Respuestas anónimas</footer>

<script>
const SUPABASE_URL = 'https://iqtkmhcmixdzqgwtqpil.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlxdGttaGNtaXhkenFnd3RxcGlsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNzU3MDEsImV4cCI6MjA5Mjk1MTcwMX0.nWJ3mFPwEcHFf6xLQXnwYgm0i6eHadZNh-GxCca-UCA';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let userVotes = JSON.parse(localStorage.getItem('charla_votes') || '{}');
let currentPollId = null;
let subscription = null;

async function loadActivePoll() {
  const { data } = await sb.from('polls').select('*').eq('active', true).single();
  return data;
}

async function getResults(pollId) {
  const { data } = await sb.from('votes').select('option').eq('poll_id', pollId);
  const counts = {};
  (data || []).forEach(r => { counts[r.option] = (counts[r.option] || 0) + 1; });
  return counts;
}

function renderPoll(poll, results) {
  const main = document.getElementById('main');
  const total = Object.values(results).reduce((a, b) => a + b, 0);
  const maxVal = Math.max(...Object.values(results), 1);
  const voted = userVotes[poll.id];

  const options = JSON.parse(poll.options);
  const icons = ['☝️', '✌️', '👌', '🤙'];

  let html = `
    <div class="poll-card active" id="poll-${poll.id}">
      <div class="poll-num">Pregunta ${poll.order_num || ''}</div>
      <div class="poll-q">${poll.question}</div>`;

  options.forEach((opt, i) => {
    const isSel = voted === opt;
    const disabled = voted ? 'disabled' : '';
    html += `<button class="opt-btn ${isSel ? 'selected' : ''}" ${disabled} onclick="castVote('${poll.id}', '${opt.replace(/'/g, "\\'")}', this)">
      <span>${opt}</span><span class="opt-icon">${icons[i] || ''}</span>
    </button>`;
  });

  if (voted) {
    html += `<div class="bar-wrap show" id="bars-${poll.id}">`;
    options.forEach(opt => {
      const count = results[opt] || 0;
      const pct = total > 0 ? Math.round(count / total * 100) : 0;
      const isWin = count === maxVal && count > 0;
      html += `<div class="bar-item">
        <div class="bar-header"><span>${opt}</span><span>${pct}% · ${count} voto${count !== 1 ? 's' : ''}</span></div>
        <div class="bar-track"><div class="bar-fill ${isWin ? 'winner' : ''}" id="fill-${poll.id}-${opt.replace(/\s/g,'_')}" style="width:${pct}%"></div></div>
      </div>`;
    });
    html += `<div class="total-badge">${total} voto${total !== 1 ? 's' : ''} en total</div>`;
    html += `<div class="thanks-msg">¡Tu voto fue registrado! Los resultados se actualizan en tiempo real.</div>`;
    html += `</div>`;
  }

  html += `</div>`;

  document.getElementById('waiting-state') && (document.getElementById('waiting-state').style.display = 'none');
  const existing = document.getElementById(`poll-${poll.id}`);
  if (existing) {
    existing.outerHTML = html;
  } else {
    main.innerHTML = html;
  }
}

function updateBars(pollId, results, options) {
  const total = Object.values(results).reduce((a, b) => a + b, 0);
  const maxVal = Math.max(...Object.values(results), 1);
  options.forEach(opt => {
    const count = results[opt] || 0;
    const pct = total > 0 ? Math.round(count / total * 100) : 0;
    const isWin = count === maxVal && count > 0;
    const key = opt.replace(/\s/g, '_');
    const fill = document.getElementById(`fill-${pollId}-${key}`);
    if (fill) {
      fill.style.width = pct + '%';
      fill.className = 'bar-fill' + (isWin ? ' winner' : '');
    }
    const header = fill && fill.closest('.bar-item')?.querySelector('.bar-header span:last-child');
    if (header) header.textContent = `${pct}% · ${count} voto${count !== 1 ? 's' : ''}`;
  });
  const badge = document.querySelector('.total-badge');
  if (badge) badge.textContent = `${total} voto${total !== 1 ? 's' : ''} en total`;
}

async function castVote(pollId, option, btn) {
  if (userVotes[pollId]) return;
  userVotes[pollId] = option;
  localStorage.setItem('charla_votes', JSON.stringify(userVotes));

  document.querySelectorAll(`#poll-${pollId} .opt-btn`).forEach(b => {
    b.disabled = true;
    if (b.querySelector('span:first-child')?.textContent === option) b.classList.add('selected');
  });

  await sb.from('votes').insert({ poll_id: pollId, option });
  const results = await getResults(pollId);
  const poll = await sb.from('polls').select('*').eq('id', pollId).single().then(r => r.data);
  renderPoll(poll, results);
}

async function subscribeToVotes(pollId, options) {
  if (subscription) subscription.unsubscribe();
  subscription = sb.channel(`votes-${pollId}`)
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'votes', filter: `poll_id=eq.${pollId}` },
      async () => {
        if (userVotes[pollId]) {
          const results = await getResults(pollId);
          updateBars(pollId, results, options);
        }
      })
    .subscribe();
}

async function subscribeToPolls() {
  sb.channel('polls-channel')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'polls' }, async () => {
      await checkAndRender();
    })
    .subscribe();
}

async function checkAndRender() {
  const poll = await loadActivePoll();
  if (!poll) {
    document.getElementById('main').innerHTML = `
      <div class="waiting" id="waiting-state">
        <div class="waiting-icon">⏳</div>
        <h2>Esperando votación...</h2>
        <p>El panelista activará la siguiente pregunta en breve.</p>
      </div>`;
    currentPollId = null;
    return;
  }
  if (poll.id === currentPollId) return;
  currentPollId = poll.id;
  const options = JSON.parse(poll.options);
  const results = await getResults(poll.id);
  renderPoll(poll, results);
  subscribeToVotes(poll.id, options);
}

checkAndRender();
subscribeToPolls();
setInterval(checkAndRender, 5000);
</script>
</body>
</html>
